<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSP Visualizer</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Digital Signal Processing</p>
          <h1>DSP Visualizer</h1>
          <p class="hero-copy">Explore sine waves and spectral behavior with an interactive signal visualizer for real-time signal analysis.</p>
        </div>
      </header>
      <main class="content-grid">
        <section class="panel controls">
          <h2>Signal Controls</h2>
          <div id="errorDisplay" class="error-display" style="display: none;"></div>
          <label>
            Frequency (Hz)
            <input id="frequency" type="number" value="5" min="1" max="50" />
          </label>
          <label>
            Amplitude
            <input id="amplitude" type="number" value="1" step="0.1" min="0.1" max="5" />
          </label>
          <label>
            Sample Rate
            <input id="sampleRate" type="number" value="256" min="50" max="1024" />
          </label>
          <label>
            Duration (s)
            <input id="duration" type="number" value="1" step="0.1" min="0.2" max="5" />
          </label>
          <div class="button-row">
            <button id="drawWaveBtn" type="button">Draw Sine Wave</button>
            <button id="fftBtn" type="button">Run FFT</button>
          </div>
        </section>
        <section class="panel output">
          <div class="canvas-card">
            <h2>Waveform</h2>
            <canvas id="waveCanvas" width="800" height="240"></canvas>
          </div>
          <div class="canvas-card">
            <h2>Spectrum</h2>
            <canvas id="spectrumCanvas" width="800" height="240"></canvas>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="./src/script.js"></script>
  </body>
</html>
